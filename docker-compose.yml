services:
  app:
    image: infinite-canvas-app:latest
    container_name: infinite-canvas
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18080/api}
    ports:
      - "3001:3000"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: ic-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-infinite_canvas}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ic-redis
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ic-backend
    ports:
      - "18080:18080"
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    environment:
      PORT: "18080"
      DB_DSN: root:${MYSQL_ROOT_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE:-infinite_canvas}?charset=utf8mb4&parseTime=True&loc=Local
      JWT_KEY: ${JWT_KEY}
      REGISTRATION_CREDITS: ${REGISTRATION_CREDITS:-0}
      REDIS_ADDR: redis:6379
      API_KEY_ENCRYPTION_KEY: ${API_KEY_ENCRYPTION_KEY}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME:-}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-}
      INIT_ADMIN_DISPLAY_NAME: ${INIT_ADMIN_DISPLAY_NAME:-}

volumes:
  mysql_data:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/backend-api}
    container_name: infinite-canvas-next
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/backend-api}
    ports:
      - "2001:3000"
    restart: unless-stopped
    networks:
      - ic-next-network

  mysql:
    image: mysql:8.4
    container_name: ic-mysql-next
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-infinite_canvas}
    volumes:
      - mysql_data_next:/var/lib/mysql
    networks:
      - ic-next-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ic-redis-next
    restart: unless-stopped
    networks:
      - ic-next-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ic-backend-next
    ports:
      - "28080:18080"
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    volumes:
      - backend_tmp_media_next:/app/tmp-media
    networks:
      - ic-next-network
    environment:
      PORT: "18080"
      DB_DSN: root:${MYSQL_ROOT_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE:-infinite_canvas}?charset=utf8mb4&parseTime=True&loc=Local
      JWT_KEY: ${JWT_KEY}
      REGISTRATION_CREDITS: ${REGISTRATION_CREDITS:-0}
      REDIS_ADDR: redis:6379
      API_KEY_ENCRYPTION_KEY: ${API_KEY_ENCRYPTION_KEY}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME:-}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-}
      INIT_ADMIN_DISPLAY_NAME: ${INIT_ADMIN_DISPLAY_NAME:-}
      TMP_MEDIA_DIR: /app/tmp-media
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      ON_DEMAND_REPAIR_URL: ${ON_DEMAND_REPAIR_URL:-}
      ON_DEMAND_REPAIR_USERNAME: ${ON_DEMAND_REPAIR_USERNAME:-}
      ON_DEMAND_REPAIR_PASSWORD: ${ON_DEMAND_REPAIR_PASSWORD:-}
      ON_DEMAND_REPAIR_TIMEOUT_SECONDS: ${ON_DEMAND_REPAIR_TIMEOUT_SECONDS:-420}

volumes:
  mysql_data_next:
  backend_tmp_media_next:

networks:
  ic-next-network:
    driver: bridge
